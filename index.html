<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Tags at Friday Harbour</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .hidden { display: none; }
        .win-bg { background-color: #ecfdf5; border-color: #10b981; color: #065f46; }
        .loss-bg { background-color: #fef2f2; border-color: #ef4444; color: #991b1b; }
        .unplayed-bg { background-color: #f8fafc; border-color: #e2e8f0; color: #64748b; }
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; }
        #lock-screen { backdrop-filter: blur(16px); transition: opacity 0.5s ease-out; }
        .nav-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .active-scale:active { transform: scale(0.96); }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen pb-24 relative">

    <!-- Identity Selection Overlay (No Passcode) -->
    <div id="lock-screen" class="fixed inset-0 z-[100] bg-emerald-950/95 flex flex-col items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl max-w-sm w-full text-center space-y-8 border border-emerald-100/20 z-10">
            <div class="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-3xl flex items-center justify-center mx-auto shadow-inner">
                <i data-lucide="user-check" class="w-10 h-10"></i>
            </div>
            <div>
                <h2 class="text-3xl font-black text-slate-800 tracking-tight">Identify Yourself</h2>
                <p class="text-slate-500 text-sm mt-2 font-medium">Select your name from the roster to access the scorecard.</p>
            </div>
            <form id="lock-form" class="space-y-4 text-left">
                <div class="relative">
                    <select id="player-identity-select" required class="w-full p-5 bg-slate-50 border-2 border-slate-100 focus:border-emerald-500 rounded-2xl text-center font-bold text-xl outline-none transition-all cursor-pointer appearance-none">
                        <option value="">Select Your Name...</option>
                    </select>
                    <div class="absolute inset-y-0 right-5 flex items-center pointer-events-none text-slate-400">
                        <i data-lucide="chevron-down" class="w-5 h-5"></i>
                    </div>
                </div>
                <button type="submit" id="unlock-btn" class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black uppercase tracking-widest hover:bg-emerald-700 shadow-xl active-scale flex items-center justify-center gap-2">
                    <i data-lucide="check" class="w-5 h-5"></i> Confirm Identity
                </button>
            </form>
        </div>
        <div class="absolute bottom-8 text-emerald-900/40 text-xs font-black tracking-widest uppercase">Version 2.1.0 • Identity Mode</div>
    </div>

    <header class="bg-emerald-900 text-white p-6 shadow-2xl sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex flex-col items-center md:items-start">
                <h1 class="text-2xl font-black flex items-center gap-2 tracking-tight uppercase">
                    <i data-lucide="lighthouse" class="w-8 h-8 text-emerald-400"></i> BATTLE TAGS
                </h1>
                <p class="text-emerald-200 text-[10px] font-black uppercase tracking-[0.2em] opacity-80">The Nest at Friday Harbour</p>
            </div>
            <nav class="flex bg-emerald-950/40 rounded-2xl p-1.5 w-full md:w-auto border border-emerald-800/50 backdrop-blur-sm">
                <button onclick="switchView('leaderboard')" id="btn-leaderboard" class="nav-btn flex-1 px-8 py-2.5 rounded-xl font-bold text-sm flex items-center justify-center gap-2 bg-white text-emerald-900 shadow-lg">
                    <i data-lucide="trophy" class="w-4 h-4"></i> Standings
                </button>
                <button onclick="switchView('slicer')" id="btn-slicer" class="nav-btn flex-1 px-8 py-2.5 rounded-xl font-bold text-sm flex items-center justify-center gap-2 text-emerald-100 hover:bg-emerald-800/50">
                    <i data-lucide="users" class="w-4 h-4"></i> My Status
                </button>
            </nav>
        </div>
    </header>

    <main class="max-w-3xl mx-auto p-4 md:p-8">
        <!-- STANDINGS VIEW -->
        <section id="view-leaderboard" class="space-y-12">
            <!-- Log Result Form -->
            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-200">
                <div class="mb-8 flex justify-between items-start">
                    <div>
                        <h3 class="text-2xl font-black text-slate-800 tracking-tight">Log a Result</h3>
                        <p class="text-slate-500 text-sm font-medium">Reporting as: <span id="display-user-name" class="text-emerald-600 font-bold uppercase">...</span></p>
                    </div>
                    <button onclick="logout()" class="text-[10px] font-black uppercase bg-slate-100 text-slate-400 px-3 py-1 rounded-lg hover:bg-rose-50 hover:text-rose-500 transition-all">Switch User</button>
                </div>
                <form id="match-form" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Reporting Player</label>
                            <div id="locked-reporter-name" class="w-full p-4 bg-slate-100 border border-slate-200 rounded-2xl font-bold text-slate-400 cursor-not-allowed uppercase tracking-tight">Loading...</div>
                        </div>
                        <div class="space-y-2 text-left">
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Select Opponent</label>
                            <div class="relative">
                                <select id="report-opponent" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-slate-700 outline-none focus:border-emerald-500 appearance-none">
                                    <option value="">Choose Opponent...</option>
                                </select>
                                <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-slate-400">
                                    <i data-lucide="chevron-down" class="w-4 h-4"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-end">
                        <div class="space-y-2">
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Your Outcome</label>
                            <div class="flex gap-3 p-1.5 bg-slate-100 rounded-2xl">
                                <button type="button" onclick="setOutcome('win')" id="outcome-win" class="flex-1 py-4 px-3 rounded-xl text-xs font-black transition-all bg-emerald-600 text-white shadow-lg uppercase tracking-widest">Captured Tag</button>
                                <button type="button" onclick="setOutcome('loss')" id="outcome-loss" class="flex-1 py-4 px-3 rounded-xl text-xs font-black transition-all text-slate-500 hover:bg-slate-200 uppercase tracking-widest">Lost Tag</button>
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Match Date</label>
                            <input type="date" id="match-date" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-slate-700 outline-none">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-slate-50 p-6 rounded-3xl border border-slate-100">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-2">
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Holes Up</label>
                                <input type="number" id="holes-up" placeholder="e.g. 3" required min="1" max="18" class="w-full p-4 bg-white border border-slate-200 rounded-2xl font-bold text-slate-700 outline-none focus:border-emerald-500">
                            </div>
                            <div class="space-y-2">
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Remaining</label>
                                <input type="number" id="holes-remaining" placeholder="e.g. 2" required min="0" max="17" class="w-full p-4 bg-white border border-slate-200 rounded-2xl font-bold text-slate-700 outline-none focus:border-emerald-500">
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Scorecard / Photo (Optional)</label>
                            <div class="relative">
                                <input type="file" id="match-photo" accept="image/*" class="hidden" onchange="updatePhotoLabel()">
                                <label for="match-photo" id="photo-label" class="flex items-center justify-center gap-2 w-full p-4 bg-white border-2 border-dashed border-slate-200 rounded-2xl font-bold text-slate-400 hover:border-emerald-500 hover:text-emerald-600 transition-all cursor-pointer">
                                    <i data-lucide="camera" class="w-5 h-5"></i> Take or Upload Photo
                                </label>
                            </div>
                        </div>
                    </div>

                    <button type="submit" id="submit-btn" class="w-full bg-slate-900 text-white py-6 rounded-2xl font-black text-sm uppercase tracking-[0.2em] hover:bg-black transition-all shadow-2xl active-scale">
                        Submit Match
                    </button>
                </form>
            </div>

            <!-- Standings Table -->
            <div class="space-y-6">
                <div class="flex items-center justify-between px-4">
                    <div>
                        <h2 class="text-xl font-black text-slate-800 uppercase tracking-tighter">Live Standings</h2>
                        <p id="last-updated-leaderboard" class="text-[10px] font-black text-slate-400 uppercase tracking-widest mt-1">Syncing with Sheet...</p>
                    </div>
                    <button onclick="fetchData()" class="text-emerald-600 p-2 hover:bg-emerald-50 rounded-full transition-all">
                        <i data-lucide="refresh-cw" class="w-5 h-5" id="refresh-icon"></i>
                    </button>
                </div>
                <div id="leaderboard-list" class="bg-white rounded-[2.5rem] shadow-xl border border-slate-200 overflow-hidden divide-y divide-slate-50">
                    <div class="p-16 text-center text-slate-400 font-bold uppercase tracking-widest animate-pulse">Syncing...</div>
                </div>
            </div>
        </section>

        <!-- MY STATUS VIEW -->
        <section id="view-slicer" class="hidden space-y-8">
            <div class="bg-white p-10 rounded-[2.5rem] shadow-xl border border-slate-200 flex flex-col md:flex-row md:items-center justify-between gap-8">
                <div>
                    <h2 class="text-3xl font-black text-slate-800 tracking-tight">Point Slicer</h2>
                    <p id="last-updated-slicer" class="text-[10px] font-black text-slate-400 uppercase tracking-widest mt-2">Syncing...</p>
                </div>
                <div class="relative min-w-[320px]">
                    <select id="slicer-select" onchange="renderSlicer()" class="w-full p-5 bg-emerald-50 border-2 border-emerald-100 rounded-2xl font-black text-emerald-900 text-xl shadow-inner outline-none focus:border-emerald-500 transition-all appearance-none"></select>
                    <div class="absolute inset-y-0 right-5 flex items-center pointer-events-none text-emerald-600">
                        <i data-lucide="chevron-down" class="w-6 h-6"></i>
                    </div>
                </div>
            </div>
            <div id="slicer-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </section>
    </main>

    <script>
        // --- 1. CONFIGURATION ---
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT2xsu-pBl1suWLMkPZA5OOLTS2oNLq1AIKq56hzfJ7lwm2HLNqT4jJoArQe0pcWsjCMqsJMFN0jtvB/pub?output=csv"; 
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzinC_HgTTRqqCdYnsWL-AqR93fW5Fhc8C8pxqYJapDocT-GL2DxRdv_yxDow-5afyOJw/exec"; 

        const PLAYERS = [
            "Alex Samson", "Brandon Benn", "Charlie McKinlay", "Colton Kalkanis",
            "Corey Pellerin", "Craig Flannagan", "Dave Ashwood", "Dave McCharles",
            "Jeff Ash", "Jesse Rabishaw", "Jordan Baker", "Jordan Horowitz",
            "Keith Palmer", "Lou Soriano", "Luke Coles", "Mike Brigden",
            "Mike Van Berkel", "Nick Coulson", "Nick Leigh", "Rick DesForges",
            "Rick Kubas", "Rob Nichols", "Ryan Fedrigo", "Sean McBurney",
            "Shane Quinlan", "Shea Burton", "Tyler Risdon"
        ].sort();

        let matches = [];
        let currentOutcome = 'win';
        let currentUser = null;

        function parseCSVLine(str) {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < str.length; i++) {
                if (str[i] === '"') inQuotes = !inQuotes;
                else if (str[i] === ',' && !inQuotes) { result.push(current); current = ''; }
                else current += str[i];
            }
            result.push(current);
            return result.map(v => v.replace(/^"|"$/g, '').trim());
        }

        async function fetchData() {
            const icon = document.getElementById('refresh-icon');
            if (icon) icon.classList.add('animate-spin');
            try {
                const urlToFetch = CSV_URL + (CSV_URL.includes('?') ? "&" : "?") + "t=" + Date.now();
                const response = await fetch(urlToFetch);
                const text = await response.text();
                if (!text || text.length < 10) throw new Error("Empty response");
                parseCSV(text);
            } catch (err) {
                console.warn("Fetch failed, retrying...", err);
                setTimeout(fetchData, 3000);
            } finally {
                if (icon) icon.classList.remove('animate-spin');
            }
        }

        function parseCSV(csvText) {
            const lines = csvText.replace(/\r/g, '').split('\n').filter(line => line.trim() !== "");
            if (lines.length === 0) return;
            let startIndex = 0;
            if (lines[0].toLowerCase().includes('reporter') || lines[0].toLowerCase().includes('timestamp')) startIndex = 1;
            
            const parsedMatches = [];
            let latestTimestampStr = "";
            let latestTimestampVal = 0;

            for (let i = startIndex; i < lines.length; i++) {
                const values = parseCSVLine(lines[i]);
                if (values.length >= 6) {
                    const tsRaw = values[0].trim();
                    const matchTime = new Date(tsRaw).getTime() || new Date(values[1].trim()).getTime() || 0;
                    if (matchTime > latestTimestampVal) { latestTimestampVal = matchTime; latestTimestampStr = tsRaw; }

                    parsedMatches.push({
                        timestampRaw: tsRaw, timestampVal: matchTime,
                        date: values[1].trim(), reporter: values[2].trim(),
                        opponent: values[3].trim(), winner: values[4].trim(),
                        loser: values[5].trim(), score: values[6] ? values[6].trim() : "",
                        photoUrl: values[7] ? values[7].trim() : ""
                    });
                }
            }
            matches = parsedMatches;
            const timeDisplay = latestTimestampStr ? `Last entry: ${latestTimestampStr}` : 'No entries yet';
            document.getElementById('last-updated-leaderboard').innerText = timeDisplay;
            document.getElementById('last-updated-slicer').innerText = timeDisplay;
            calculateLeaderboard();
            if (!document.getElementById('view-slicer').classList.contains('hidden')) renderSlicer();
        }

        function calculateLeaderboard() {
            const scores = {};
            PLAYERS.forEach(p => scores[p] = 0);
            const latestPairs = {};
            
            matches.sort((a,b) => a.timestampVal - b.timestampVal).forEach(m => {
                const pairId = [m.reporter, m.opponent].sort().join('_');
                latestPairs[pairId] = m;
            });

            Object.values(latestPairs).forEach(m => { if (m.winner && scores[m.winner] !== undefined) scores[m.winner]++; });
            const sorted = Object.entries(scores).map(([name, points]) => ({ name, points })).sort((a, b) => b.points - a.points || a.name.localeCompare(b.name));
            
            document.getElementById('leaderboard-list').innerHTML = sorted.map((p, i) => `
                <div class="flex items-center justify-between p-7 hover:bg-slate-50 transition-colors">
                    <div class="flex items-center gap-6">
                        <span class="w-8 h-8 rounded-lg flex items-center justify-center font-black text-xs ${i < 3 ? 'bg-amber-400 text-white shadow-md' : 'bg-slate-100 text-slate-400'}">${i + 1}</span>
                        <span class="font-bold text-slate-800 text-base tracking-tight uppercase">${p.name}</span>
                    </div>
                    <div class="text-right">
                        <div class="text-2xl font-black text-emerald-700 leading-none">${p.points}</div>
                        <div class="text-[8px] font-black text-slate-400 uppercase tracking-widest mt-1">Tags</div>
                    </div>
                </div>`).join('');
        }

        function updatePhotoLabel() {
            const file = document.getElementById('match-photo').files[0];
            const label = document.getElementById('photo-label');
            if (file) {
                label.innerText = `📎 ${file.name}`;
                label.className = "flex items-center justify-center gap-2 w-full p-4 bg-emerald-50 border-2 border-emerald-500 rounded-2xl font-bold text-emerald-600 cursor-pointer";
            }
        }

        async function processImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width; let height = img.height; 
                        const maxDim = 800; 
                        if (width > height && width > maxDim) { height *= maxDim / width; width = maxDim; }
                        else if (height > maxDim) { width *= maxDim / height; height = maxDim; }
                        canvas.width = width; canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.5)); 
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        document.getElementById('match-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const p1 = currentUser; 
            const p2 = document.getElementById('report-opponent').value;
            const date = document.getElementById('match-date').value;
            const hUp = document.getElementById('holes-up').value;
            const hRem = document.getElementById('holes-remaining').value;
            const photoFile = document.getElementById('match-photo').files[0];

            if (!p1 || !p2 || p1 === p2) { alert("Please select a valid opponent."); return; }
            
            btn.disabled = true; btn.innerText = "Syncing...";

            const winner = currentOutcome === 'win' ? p1 : p2;
            const loser = currentOutcome === 'win' ? p2 : p1;
            const finalScore = `${hUp} & ${hRem}`;
            
            let imageData = ""; let imageName = "";
            if (photoFile) {
                btn.innerText = "Processing Photo...";
                imageData = await processImage(photoFile);
                imageName = `Match_${p1}_vs_${p2}_${date}.jpg`;
            }

            btn.innerText = "Uploading to Sheet...";

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST', 
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ 
                        date, reporter: p1, opponent: p2, winner, loser, score: finalScore,
                        image: imageData, imageName: imageName
                    })
                });

                const resultText = await response.text();
                
                if (resultText.includes("Error") || resultText.includes("Critical")) {
                    alert("Sheet Error: " + resultText);
                    btn.disabled = false; btn.innerText = "Submit Match";
                    return;
                }

                document.getElementById('report-opponent').value = "";
                document.getElementById('holes-up').value = "";
                document.getElementById('holes-remaining').value = "";
                document.getElementById('match-photo').value = "";
                document.getElementById('photo-label').innerHTML = `<i data-lucide="camera" class="w-5 h-5"></i> Take or Upload Photo`;
                document.getElementById('photo-label').className = "flex items-center justify-center gap-2 w-full p-4 bg-white border-2 border-dashed border-slate-200 rounded-2xl font-bold text-slate-400 hover:border-emerald-500 hover:text-emerald-600 transition-all cursor-pointer";
                
                btn.innerText = "Success!";
                setTimeout(() => { fetchData(); btn.disabled = false; btn.innerText = "Submit Match"; }, 2000); 
            } catch (err) {
                alert("Upload failed. Ensure script is correctly deployed and connected.");
                btn.disabled = false; btn.innerText = "Submit Match";
            }
        };

        function switchView(view) {
            document.getElementById('view-leaderboard').classList.toggle('hidden', view !== 'leaderboard');
            document.getElementById('view-slicer').classList.toggle('hidden', view !== 'slicer');
            const btnLead = document.getElementById('btn-leaderboard');
            const btnSlice = document.getElementById('btn-slicer');
            if (view === 'leaderboard') {
                btnLead.className = "nav-btn flex-1 px-8 py-2.5 rounded-xl font-bold text-sm flex items-center justify-center gap-2 bg-white text-emerald-900 shadow-lg";
                btnSlice.className = "nav-btn flex-1 px-8 py-2.5 rounded-xl font-bold text-sm flex items-center justify-center gap-2 text-emerald-100 hover:bg-emerald-800/50";
            } else {
                btnSlice.className = "nav-btn flex-1 px-8 py-2.5 rounded-xl font-bold text-sm flex items-center justify-center gap-2 bg-white text-emerald-900 shadow-lg";
                btnLead.className = "nav-btn flex-1 px-8 py-2.5 rounded-xl font-bold text-sm flex items-center justify-center gap-2 text-emerald-100 hover:bg-emerald-800/50";
                renderSlicer();
            }
        }

        function setOutcome(val) {
            currentOutcome = val;
            document.getElementById('outcome-win').className = val === 'win' ? "flex-1 py-4 px-3 rounded-xl text-xs font-black transition-all bg-emerald-600 text-white shadow-lg uppercase tracking-widest" : "flex-1 py-4 px-3 rounded-xl text-xs font-black text-slate-500 hover:bg-slate-200 uppercase tracking-widest";
            document.getElementById('outcome-loss').className = val === 'loss' ? "flex-1 py-4 px-3 rounded-xl text-xs font-black bg-rose-600 text-white shadow-lg uppercase tracking-widest" : "flex-1 py-4 px-3 rounded-xl text-xs font-black text-slate-500 hover:bg-slate-200 uppercase tracking-widest";
        }

        function renderSlicer() {
            const selected = document.getElementById('slicer-select').value;
            const grid = document.getElementById('slicer-grid');
            const playerMatches = {};
            
            matches.forEach(m => {
                if (m.reporter === selected || m.opponent === selected) {
                    const opp = m.reporter === selected ? m.opponent : m.reporter;
                    const mTime = m.timestampVal || 0;
                    const existingTime = playerMatches[opp] ? (playerMatches[opp].timestampVal || 0) : -1;
                    if (mTime > existingTime) playerMatches[opp] = m;
                }
            });

            grid.innerHTML = PLAYERS.filter(p => p !== selected).map(opp => {
                const match = playerMatches[opp];
                const isWin = match && match.winner === selected;
                const label = !match ? 'Not Played' : isWin ? `Won (${match.score})` : `Lost (${match.score})`;
                const style = !match ? 'unplayed-bg' : isWin ? 'win-bg border-emerald-200' : 'loss-bg border-rose-200';
                const hasPhoto = match && match.photoUrl && match.photoUrl.startsWith("http");
                const photoIcon = hasPhoto ? `<a href="${match.photoUrl}" target="_blank" class="p-2 bg-white/50 rounded-lg hover:bg-white transition-all active-scale"><i data-lucide="image" class="w-4 h-4 text-slate-600"></i></a>` : "";
                
                return `<div class="p-6 rounded-[2rem] border-2 flex items-center justify-between transition-all ${style} group hover:shadow-md">
                    <div class="flex items-center gap-4">
                        <div>
                            <h4 class="font-black text-base text-slate-800 uppercase tracking-tight">${opp}</h4>
                            <p class="text-[10px] font-black uppercase opacity-60 tracking-wider">${label}</p>
                        </div>
                        ${photoIcon}
                    </div>
                    <i data-lucide="${!match ? 'minus-circle' : isWin ? 'check-circle-2' : 'x-circle'}" class="w-6 h-6"></i>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function unlock(userName) {
            currentUser = userName; 
            localStorage.setItem('fh_battle_tags_user', userName);
            document.getElementById('display-user-name').innerText = userName;
            document.getElementById('locked-reporter-name').innerText = userName;
            document.getElementById('slicer-select').value = userName;
            
            const oppSelect = document.getElementById('report-opponent');
            oppSelect.innerHTML = '<option value="">Choose Opponent...</option>';
            PLAYERS.filter(p => p !== userName).forEach(n => oppSelect.add(new Option(n, n)));
            
            document.getElementById('lock-screen').style.opacity = '0';
            setTimeout(() => { document.getElementById('lock-screen').classList.add('hidden'); }, 500);
        }

        function logout() { 
            localStorage.removeItem('fh_battle_tags_user'); 
            location.reload(); 
        }

        document.getElementById('lock-form').onsubmit = (e) => {
            e.preventDefault();
            const selectedName = document.getElementById('player-identity-select').value;
            if (selectedName) {
                unlock(selectedName);
            }
        };

        window.onload = () => {
            const identitySelect = document.getElementById('player-identity-select');
            const slicerSelect = document.getElementById('slicer-select');
            
            PLAYERS.forEach(n => {
                identitySelect.add(new Option(n, n));
                slicerSelect.add(new Option(n, n));
            });

            document.getElementById('match-date').value = new Date().toISOString().split('T')[0];
            
            fetchData();
            
            const savedUser = localStorage.getItem('fh_battle_tags_user');
            if (savedUser && PLAYERS.includes(savedUser)) {
                unlock(savedUser);
            }
            
            lucide.createIcons();
        };
    </script>
</body>
</html>

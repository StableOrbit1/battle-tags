<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Tags Friday Harbour v3.0.3 (Final)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .hidden { display: none !important; }
        input, select { -webkit-appearance: none; }
        .active-scale:active { transform: scale(0.96); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        input[type="date"]::-webkit-calendar-picker-indicator {
            background-color: #f8fafc;
            padding: 5px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen pb-24 text-center">

    <div id="screen-loading" class="fixed inset-0 z-[200] bg-slate-50 flex items-center justify-center">
        <div class="font-black text-slate-400 uppercase tracking-widest flex items-center gap-3 animate-pulse">
            <i data-lucide="loader-2" class="w-6 h-6 animate-spin"></i> Syncing Database...
        </div>
    </div>

    <div id="screen-password" class="fixed inset-0 z-[100] bg-emerald-950 flex flex-col items-center justify-center p-6 text-center hidden">
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl max-w-sm w-full space-y-8">
            <div class="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-3xl flex items-center justify-center mx-auto shadow-inner">
                <i data-lucide="lock" class="w-10 h-10"></i>
            </div>
            <div>
                <h2 class="text-3xl font-black text-slate-800 tracking-tight leading-tight">Welcome to BattleTag<br><span class="text-emerald-600">2026 Edition</span></h2>
                <p class="text-slate-500 text-sm mt-3 font-medium">Enter the Access Code.</p>
            </div>
            <form id="password-form" class="space-y-4">
                <input type="password" id="pw-input" required placeholder="••••••" class="w-full p-5 bg-slate-50 border-2 border-slate-100 focus:border-emerald-500 rounded-2xl text-center font-black text-2xl outline-none tracking-widest uppercase">
                <button type="submit" class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black uppercase tracking-widest hover:bg-emerald-700 shadow-xl transition-all active-scale">Verify Code</button>
            </form>
        </div>
    </div>

    <div id="screen-identity" class="fixed inset-0 z-[90] bg-emerald-900 flex flex-col items-center justify-center p-6 text-center hidden">
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl max-w-sm w-full space-y-8 border border-emerald-100/20">
            <div class="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-3xl flex items-center justify-center mx-auto shadow-inner">
                <i data-lucide="user-check" class="w-10 h-10"></i>
            </div>
            <div>
                <h2 class="text-3xl font-black text-slate-800 tracking-tight tracking-tighter">Who are you?</h2>
                <p class="text-slate-500 text-sm mt-2 font-medium">Select your name to start tracking.</p>
            </div>
            <div id="identity-list" class="space-y-3 max-h-72 overflow-y-auto pr-2 custom-scrollbar">
                </div>
        </div>
    </div>

    <div id="screen-app" class="hidden">
        <header class="bg-emerald-900 text-white p-6 shadow-2xl sticky top-0 z-50">
            <div class="max-w-4xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex flex-col items-center md:items-start">
                    <h1 class="text-2xl font-black flex items-center gap-2 tracking-tight uppercase">
                        <i data-lucide="trophy" class="w-6 h-6 text-emerald-400"></i> BATTLE TAGS
                    </h1>
                    <p class="text-emerald-200 text-[10px] font-black uppercase tracking-[0.2em] opacity-80">The Nest at Friday Harbour</p>
                </div>
                <nav class="flex bg-emerald-950/40 rounded-2xl p-1.5 w-full md:w-auto border border-emerald-800/50 backdrop-blur-sm">
                    <button onclick="switchView('leaderboard')" id="nav-leaderboard" class="flex-1 py-3 px-6 rounded-xl font-black text-xs uppercase transition-all bg-white text-emerald-900 shadow-sm">
                        Standings
                    </button>
                    <button onclick="switchView('damage')" id="nav-damage" class="flex-1 py-3 px-6 rounded-xl font-black text-xs uppercase transition-all text-emerald-100 opacity-60 flex items-center gap-2 justify-center">
                        <i data-lucide="swords" class="w-3 h-3"></i> Damage Report
                    </button>
                </nav>
            </div>
        </header>

        <main class="max-w-4xl mx-auto p-4 md:p-8 space-y-12">
            <section id="view-leaderboard" class="space-y-12">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-200 text-left relative overflow-hidden">
                    <div class="mb-8 flex justify-between items-start">
                        <div>
                            <h3 class="text-2xl font-black text-slate-800 tracking-tight">Report Capture</h3>
                            <p class="text-slate-500 text-sm font-medium">
                                Reporting as <span id="display-user-name" class="text-emerald-600 font-bold uppercase">...</span>
                            </p>
                        </div>
                        <button onclick="logout()" class="p-2 text-slate-400 hover:text-rose-500 transition-colors bg-slate-50 rounded-xl" title="Switch User">
                            <i data-lucide="log-out" class="w-5 h-5"></i>
                        </button>
                    </div>
                    
                    <form id="match-form" class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="block text-[10px] font-black text-rose-500 uppercase tracking-widest ml-1">Defeated Opponent</label>
                                <select id="report-opponent" required class="w-full p-4 bg-slate-50 border-2 border-rose-100 rounded-2xl font-bold text-slate-700 outline-none focus:border-rose-400 appearance-none cursor-pointer">
                                    <option value="">Select Opponent...</option>
                                </select>
                            </div>
                            <div class="space-y-2">
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Match Date</label>
                                <input type="date" id="match-date" required class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-slate-700 outline-none focus:border-emerald-500">
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-6 bg-slate-50 p-6 rounded-3xl border border-slate-100">
                            <div class="space-y-2">
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Holes Up</label>
                                <input type="number" id="holes-up" required min="1" max="18" placeholder="3" class="w-full p-4 bg-white border border-slate-200 rounded-2xl font-bold text-slate-700 outline-none focus:border-emerald-500">
                            </div>
                            <div class="space-y-2">
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Remaining</label>
                                <input type="number" id="holes-remaining" required min="0" max="17" placeholder="2" class="w-full p-4 bg-white border border-slate-200 rounded-2xl font-bold text-slate-700 outline-none focus:border-emerald-500">
                            </div>
                        </div>

                        <button type="submit" id="submit-btn" class="w-full bg-slate-900 text-white py-6 rounded-2xl font-black text-sm uppercase tracking-[0.2em] hover:bg-black transition-all shadow-2xl active-scale flex items-center justify-center gap-2">
                            <i data-lucide="upload-cloud" class="w-5 h-5"></i> Submit Win
                        </button>
                    </form>
                </div>

                <div class="space-y-6">
                    <h2 class="text-xl font-black text-slate-800 uppercase tracking-tighter text-left ml-4">Live Standings</h2>
                    <div id="leaderboard-list" class="bg-white rounded-[2.5rem] shadow-xl border border-slate-200 overflow-hidden text-left divide-y divide-slate-50">
                        <div class="p-16 text-center text-slate-400 font-bold uppercase tracking-widest animate-pulse">Syncing Database...</div>
                    </div>
                </div>
            </section>

            <section id="view-damage" class="hidden space-y-8 text-left">
                <div class="bg-white p-10 rounded-[3rem] shadow-xl border border-slate-200">
                    <h2 class="text-3xl font-black text-slate-800 tracking-tight">Damage Report</h2>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mt-2">Latest results for <span id="damage-report-name" class="text-emerald-600 font-bold">...</span></p>
                    
                    <!-- Stats Badges -->
                    <div id="damage-stats" class="flex flex-wrap gap-3 mt-5">
                        <!-- Populated by JS -->
                    </div>
                </div>
                
                <div id="damage-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    </div>
            </section>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        // --- FIREBASE CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyDf_1RE4hscqVVbHoN7Vvqoylj8elWLUn4",
            authDomain: "battletags-27390.firebaseapp.com",
            projectId: "battletags-27390",
            storageBucket: "battletags-27390.firebasestorage.app",
            messagingSenderId: "930795580018",
            appId: "1:930795580018:web:b82b95d64572483f85f0eb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'friday-harbour-battle-tags';
        const ACCESS_PASSWORD = "FH2026";

        // --- GLOBAL STATE ---
        let currentUser = null;
        let players = [];
        let matches = [];

        // --- INITIALIZATION ---
        document.getElementById('match-date').value = new Date().toISOString().split('T')[0];
        lucide.createIcons();

        signInAnonymously(auth).catch(err => console.error("Auth Error:", err));

        onAuthStateChanged(auth, (firebaseUser) => {
            if (firebaseUser) {
                listenToPlayers();
                listenToMatches();

                const isUnlocked = localStorage.getItem('bt_unlocked') === 'true';
                const savedName = localStorage.getItem('bt_identity');

                if (!isUnlocked) {
                    showScreen('password');
                } else if (!savedName) {
                    showScreen('identity');
                } else {
                    setIdentity(savedName);
                    showScreen('app');
                }
            }
        });

        // --- SCREEN MANAGEMENT ---
        function showScreen(screenName) {
            document.getElementById('screen-loading').classList.add('hidden');
            document.getElementById('screen-password').classList.add('hidden');
            document.getElementById('screen-identity').classList.add('hidden');
            document.getElementById('screen-app').classList.add('hidden');

            document.getElementById(`screen-${screenName}`).classList.remove('hidden');

            if (screenName === 'app') {
                document.body.classList.remove('overflow-hidden');
            } else {
                document.body.classList.add('overflow-hidden');
            }
        }

        window.switchView = function(viewName) {
            document.getElementById('view-leaderboard').classList.toggle('hidden', viewName !== 'leaderboard');
            document.getElementById('view-damage').classList.toggle('hidden', viewName !== 'damage');

            const navLead = document.getElementById('nav-leaderboard');
            const navDam = document.getElementById('nav-damage');

            if (viewName === 'leaderboard') {
                navLead.className = "flex-1 py-3 px-6 rounded-xl font-black text-xs uppercase transition-all bg-white text-emerald-900 shadow-sm";
                navDam.className = "flex-1 py-3 px-6 rounded-xl font-black text-xs uppercase transition-all text-emerald-100 opacity-60 flex items-center gap-2 justify-center";
            } else {
                navLead.className = "flex-1 py-3 px-6 rounded-xl font-black text-xs uppercase transition-all text-emerald-100 opacity-60";
                navDam.className = "flex-1 py-3 px-6 rounded-xl font-black text-xs uppercase transition-all bg-white text-emerald-900 shadow-sm flex items-center gap-2 justify-center";
            }
        };

        // --- DATA LISTENERS ---
        function listenToPlayers() {
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'players');
            onSnapshot(q, (snapshot) => {
                players = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a, b) => a.name.localeCompare(b.name));
                updateIdentityList();
                updateOpponentDropdown();
                updateUserStatusDisplay();
                renderLeaderboard();
                renderDamageReport();
            });
        }

        function listenToMatches() {
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'matches');
            onSnapshot(q, (snapshot) => {
                matches = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderLeaderboard();
                renderDamageReport();
            });
        }

        // --- USER ACTIONS & FORM HANDLING ---
        document.getElementById('password-form').onsubmit = function(e) {
            e.preventDefault();
            const pw = document.getElementById('pw-input').value;
            if (pw.toUpperCase() === ACCESS_PASSWORD) {
                localStorage.setItem('bt_unlocked', 'true');
                showScreen('identity');
            } else {
                alert("Invalid Access Code");
            }
        };

        window.handleIdentitySubmit = function(name) {
            localStorage.setItem('bt_identity', name);
            setIdentity(name);
            showScreen('app');
        };

        function setIdentity(name) {
            currentUser = name;
            updateUserStatusDisplay();
            updateOpponentDropdown();
            renderDamageReport();
        }

        window.logout = function() {
            localStorage.removeItem('bt_unlocked');
            localStorage.removeItem('bt_identity');
            window.location.reload();
        };

        document.getElementById('match-form').onsubmit = async function(e) {
            e.preventDefault();
            const opponent = document.getElementById('report-opponent').value;
            const date = document.getElementById('match-date').value;
            const holesUp = document.getElementById('holes-up').value;
            const holesRem = document.getElementById('holes-remaining').value;
            
            const btn = document.getElementById('submit-btn');

            if (!opponent || !currentUser) return;

            // Secure visual Loading state
            btn.disabled = true;
            btn.classList.add('opacity-50');
            btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Syncing...`;
            lucide.createIcons();

            try {
                const pairId = [currentUser, opponent].sort().join('_').replace(/\s+/g, '');
                const matchDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'matches', pairId);
                
                await setDoc(matchDocRef, {
                    winner: currentUser,
                    loser: opponent,
                    score: `${holesUp} & ${holesRem}`,
                    date: date,
                    timestamp: new Date().toISOString()
                });

                document.getElementById('report-opponent').value = "";
                document.getElementById('holes-up').value = "";
                document.getElementById('holes-remaining').value = "";
                
                alert("Tag Captured! Damage Report and Standings updated.");

            } catch (err) {
                console.error(err);
                alert("Database error. Check your connection.");
            } finally {
                // Restore button state securely
                btn.disabled = false;
                btn.classList.remove('opacity-50');
                btn.innerHTML = `<i data-lucide="upload-cloud" class="w-5 h-5"></i> Submit Win`;
                lucide.createIcons();
            }
        };

        // --- DOM UPDATES ---
        function updateIdentityList() {
            const list = document.getElementById('identity-list');
            list.innerHTML = players.map(p => `
                <button type="button" onclick="handleIdentitySubmit('${p.name}')" class="w-full p-4 bg-slate-50 border-2 border-slate-100 hover:border-emerald-500 rounded-2xl font-bold text-slate-700 flex justify-between items-center group transition-all active-scale">
                    <span class="uppercase tracking-tight text-sm">${p.name}</span>
                    <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300 group-hover:text-emerald-500"></i>
                </button>
            `).join('');
            lucide.createIcons();
        }

        function updateOpponentDropdown() {
            if (!currentUser) return;
            const select = document.getElementById('report-opponent');
            select.innerHTML = '<option value="">Select Opponent...</option>';
            players.filter(p => p.name !== currentUser).forEach(p => {
                select.add(new Option(p.name, p.name));
            });
        }

        function updateUserStatusDisplay() {
            if (!currentUser) return;
            
            const pData = players.find(p => p.name === currentUser);
            let displayHtml = `${currentUser}`;
            
            if (pData) {
                const isPaid = pData.paid === 'Y';
                const statusColor = isPaid ? 'text-emerald-500' : 'text-rose-500';
                const statusText = isPaid ? 'PAID UP' : 'NOT PAID';
                displayHtml += `<span class="ml-1 font-black ${statusColor}">(${statusText})</span>`;
            }
            
            document.getElementById('display-user-name').innerHTML = displayHtml;
        }

        function renderLeaderboard() {
            const scores = {};
            players.forEach(p => scores[p.name] = 0);
            
            matches.forEach(m => {
                if (scores[m.winner] !== undefined) scores[m.winner]++;
            });

            const sorted = Object.entries(scores)
                .map(([name, points]) => ({ name, points }))
                .sort((a, b) => b.points - a.points || a.name.localeCompare(b.name));

            const listEl = document.getElementById('leaderboard-list');
            
            if (sorted.length === 0) {
                listEl.innerHTML = '<div class="p-16 text-center text-slate-400 font-bold uppercase tracking-widest animate-pulse">Syncing Database...</div>';
                return;
            }

            listEl.innerHTML = sorted.map((p, i) => `
                <div class="flex items-center justify-between p-6 hover:bg-slate-50 transition-colors">
                    <div class="flex items-center gap-5">
                        <span class="w-8 h-8 rounded-lg flex items-center justify-center font-black text-xs ${i < 3 ? 'bg-amber-400 text-white shadow-md' : 'bg-slate-100 text-slate-400'}">
                            ${i + 1}
                        </span>
                        <span class="font-bold text-slate-800 uppercase tracking-tight">${p.name}</span>
                    </div>
                    <div class="text-right">
                        <div class="text-2xl font-black text-emerald-700 leading-none">${p.points}</div>
                        <div class="text-[8px] font-black text-slate-400 uppercase tracking-widest mt-1">Tags</div>
                    </div>
                </div>
            `).join('');
        }

        function renderDamageReport() {
            const grid = document.getElementById('damage-grid');
            const nameLabel = document.getElementById('damage-report-name');
            const statsContainer = document.getElementById('damage-stats');
            
            if (!currentUser) return;

            nameLabel.innerText = currentUser.toUpperCase();

            let playedCount = 0;
            let wonCount = 0;
            let lostCount = 0;

            const html = players.filter(p => p.name !== currentUser).map(opp => {
                const pairId = [currentUser, opp.name].sort().join('_').replace(/\s+/g, '');
                const match = matches.find(m => m.id === pairId);
                const isWin = match && match.winner === currentUser;
                const status = !match ? 'unplayed' : isWin ? 'won' : 'lost';

                if (status === 'won') wonCount++;
                if (status === 'lost') lostCount++;

                const styleClass = status === 'won' ? 'bg-emerald-50 border-emerald-200 shadow-sm' : 
                                   status === 'lost' ? 'bg-rose-50 border-rose-200 shadow-sm' : 
                                   'bg-white border-slate-100 opacity-70';
                
                const statusText = status === 'unplayed' ? 'Not Played' : 
                                   status === 'won' ? `Captured (${match.score})` : 
                                   `Lost (${match.score})`;

                const dateHtml = match ? `<div class="flex items-center gap-1 mt-1 text-[9px] font-bold text-slate-400 uppercase"><i data-lucide="calendar" class="w-3 h-3"></i> ${match.date}</div>` : '';
                
                const icon = status === 'unplayed' 
                    ? `<i data-lucide="minus-circle" class="w-6 h-6 text-slate-300"></i>` 
                    : status === 'won' 
                        ? `<span class="text-2xl drop-shadow-sm" title="Tag Captured">🏷️</span>` 
                        : `<span class="text-2xl drop-shadow-sm" title="Defeated">💀</span>`;

                return `
                    <div class="p-6 rounded-[2rem] border-2 flex items-center justify-between transition-all ${styleClass}">
                        <div class="text-left">
                            <h4 class="font-black text-base text-slate-800 uppercase tracking-tight">${opp.name}</h4>
                            <p class="text-[10px] font-black uppercase opacity-60 tracking-wider">${statusText}</p>
                            ${dateHtml}
                        </div>
                        ${icon}
                    </div>
                `;
            }).join('');

            playedCount = wonCount + lostCount;

            statsContainer.innerHTML = `
                <div class="flex items-center gap-2 bg-slate-100 border border-slate-200 text-slate-700 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-sm">
                    <span class="text-sm">⚔️</span> ${playedCount} Played
                </div>
                <div class="flex items-center gap-2 bg-emerald-50 border border-emerald-100 text-emerald-700 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-sm">
                    <span class="text-sm">🏷️</span> ${wonCount} Won
                </div>
                <div class="flex items-center gap-2 bg-rose-50 border border-rose-100 text-rose-700 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-sm">
                    <span class="text-sm">💀</span> ${lostCount} Lost
                </div>
            `;

            grid.innerHTML = html;
            lucide.createIcons();
        }
    </script>
</body>
</html>
